name: MERN Stack CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    # Only trigger if code inside the frontend folder changes
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'

jobs:
  frontend-ci:
    name: Frontend CI (Build & Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-with-version: '20' # Matches modern Node environments
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Check Code Linting (Optional)
        # Uncomment this line if you have ESLint set up in your frontend
        # run: npm run lint
        working-directory: ./frontend
        continue-on-error: true

      - name: Run Frontend Tests
        # If you use Vite/Jest, ensure this command exists in package.json
        run: npm test -- --watchAll=false || echo "No tests specified yet"
        working-directory: ./frontend

      - name: Build Frontend Production Assets
        run: npm run build
        working-directory: ./frontend

